<!doctype html>
<html lang="en">
	<head>
			<meta charset="utf-8" />
			<meta name="viewport" content="width=device-width,initial-scale=1" />
			<title>Login</title>
			<link rel="stylesheet" href="styles.css">
	</head>
	<body>
		<main class="container" role="main">
			<section class="card" aria-labelledby="login-title">
				<h1 id="login-title">Sign in to your account</h1>
				<p class="lead">Enter your credentials to access the dashboard.</p>

				<form id="loginForm" novalidate>
					<div class="field">
						<label for="email">Email address</label>
						<input id="email" name="email" type="email" inputmode="email" autocomplete="email" required aria-describedby="emailHelp emailError" placeholder="you@example.com">
						<div id="emailHelp" class="hint">We'll never share your email.</div>
						<div id="emailError" class="error" role="alert" aria-live="polite"></div>
					</div>

					<div class="field">
						<div class="row" style="justify-content:space-between;">
							<label for="password">Password</label>
							<a href="#" class="help" id="forgotLink">Forgot password?</a>
						</div>
						<div class="password-row">
							<input id="password" name="password" type="password" autocomplete="current-password" required minlength="8" aria-describedby="passwordError" placeholder="••••••••">
							<button type="button" class="toggle-pass" id="togglePass" aria-pressed="false" aria-label="Show password">Show</button>
						</div>
						<div id="passwordError" class="error" role="alert" aria-live="polite"></div>
					</div>

					<div class="row" style="align-items:center;justify-content:space-between;margin-top:6px">
						<label class="remember"><input type="checkbox" id="remember" name="remember"> Remember me</label>
						<div style="font-size:12px;color:var(--muted)">Need an account? <a href="#">Sign up</a></div>
					</div>

					<div class="actions">
						<button type="submit" class="btn" id="submitBtn">Sign in</button>
						<button type="button" class="secondary" id="demoBtn">Demo</button>
					</div>

					<div id="formStatus" class="hint" style="margin-top:12px" aria-live="polite"></div>
				</form>
			</section>
		</main>

		<script src="script.js"></script>
	</body>
</html>
